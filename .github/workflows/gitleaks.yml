# Gitleaks — scans the full git history for committed secrets.
# Ported from austdx-stack for parity. Non-gating; complements the TruffleHog
# scan in security-scanning.yml (different engine, different coverage).
# Uses gitleaks' built-in ruleset (no custom config/.gitleaks.toml in this repo).
name: gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Secret history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSfL -o gitleaks.tgz "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tgz" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f gitleaks.tgz gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks detect --source . --redact --no-banner
