# OWASP Dependency-Check — scans dependency manifests for known-vulnerable
# components. Ported from austdx-stack for parity.
#
# NOTE: file-assoc currently ships only a Brewfile + shell scripts and has NO
# package manifests (no package.json/lockfiles/pom/go.mod/etc.), so this scan
# has nothing to analyze yet. It is intentionally DORMANT: it runs only on a
# weekly schedule / manual dispatch and stays gated behind the NVD_API_KEY
# secret, so it is a no-op until a key is configured and scannable manifests
# exist. Kept as a ready placeholder so the scanner set matches austdx-stack.
name: dependency-check

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: dependency-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-secret:
    name: Check NVD_API_KEY presence
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.probe.outputs.has_key }}
    steps:
      # Secrets are available in step expressions; gate the scan on the key
      # existing so the scheduled cron stays dormant until NVD_API_KEY is set.
      - id: probe
        env:
          HAS_KEY: ${{ secrets.NVD_API_KEY != '' }}
        run: echo "has_key=${HAS_KEY}" >> "$GITHUB_OUTPUT"

  owasp:
    name: OWASP dependency-check
    needs: check-secret
    if: ${{ needs.check-secret.outputs.has_key == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency-Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        with:
          project: file-assoc
          path: "."
          format: "HTML"
          args: >-
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --failOnCVSS 8

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dependency-check-report
          path: reports/
